kind = "web"
previewPath = "/"
title = "Sukoon"
version = "1.0.0"
id = "artifacts/sukoon"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18810

[services.development]
run = "pnpm --filter @workspace/sukoon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sukoon", "run", "build" ]
serve = "static"
publicDir = "artifacts/sukoon/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18810"
BASE_PATH = "/"
